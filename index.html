<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Measuring Station</title>
        
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header-container">
        <div class="container-fluid">
            <div class="header-content">
                <div class="header-left">
                    <div class="header-icon">
                        <i class="fas fa-broadcast-tower"></i>
                    </div>
                    <h1 class="header-title">Measurement Station</h1>
                </div>
                <div class="live-indicator">
                    <span class="live-dot"></span>
                    <span class="live-text">Live</span>
                </div>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="container-fluid">
            <div class="row g-4 sensors-row">
                <div class="col-lg-4">
                    <div class="sensor-card">
                        <div class="card-header-custom">
                            <div class="sensor-icon temperature-icon">
                                <i class="fas fa-thermometer-half"></i>
                            </div>
                            <div class="sensor-header-info">
                                <h5 class="sensor-name">Temperature</h5>
                                <div class="status-badge">
                                    <span class="status-dot"></span>
                                    <span class="status-text">Normal</span>
                                </div>
                            </div>
                        </div>
                        <div class="card-body-custom">
                            <canvas id="temperatureCanvas" width="350" height="350" class="sensor-canvas"></canvas>
                        </div>
                        <div class="card-footer-custom">
                            <div class="update-info">
                                <span class="status-dot-small"></span>
                                <span id="tempStatus">Normal</span>
                            </div>
                        </div>
                        <div class="card-bottom-label">
                            <span class="sensor-icon-small">
                                <i class="fas fa-thermometer-half"></i>
                            </span>
                            <span id="tempLabel">Temperature: 22.0 °C</span>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="sensor-card">
                        <div class="card-header-custom">
                            <div class="sensor-icon pressure-icon">
                                <i class="fas fa-gauge"></i>
                            </div>
                            <div class="sensor-header-info">
                                <h5 class="sensor-name">Pressure</h5>
                                <div class="status-badge">
                                    <span class="status-dot"></span>
                                    <span id="pressureHeaderStatus" class="status-text">Low</span>
                                </div>
                            </div>
                        </div>
                        <div class="card-body-custom">
                            <canvas id="pressureCanvas" width="350" height="350" class="sensor-canvas"></canvas>
                        </div>
                        <div class="card-footer-custom">
                            <div class="update-info">
                                <span class="status-dot-small"></span>
                                <span id="pressureStatus">Low</span>
                            </div>
                            
                        </div>
                        <div class="card-bottom-label">
                            <span class="sensor-icon-small">
                                <i class="fas fa-gauge"></i>
                            </span>
                            <span id="pressureLabel">Pressure: 55.00 kPa</span>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="sensor-card">
                        <div class="card-header-custom">
                            <div class="sensor-icon co-icon">
                                <span class="co-text">CO</span>
                            </div>
                            <div class="sensor-header-info">
                                <h5 class="sensor-name">CO Concentration</h5>
                                <div class="status-badge">
                                    <span class="status-dot"></span>
                                    <span class="status-text">Normal</span>
                                </div>
                            </div>
                        </div>
                        <div class="card-body-custom">
                            <canvas id="coCanvas" width="350" height="350" class="sensor-canvas"></canvas>
                        </div>
                        <div class="card-footer-custom">
                            <div class="update-info">
                                <span class="status-dot-small"></span>
                                <span id="coStatus">Normal</span>
                            </div>
                        </div>
                        <div class="card-bottom-label">
                            <span class="sensor-icon-small">
                                <span class="co-text-small">CO</span>
                            </span>
                            <span id="coLabel">CO: 5.0 ppm</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/pressureSensor.js"></script>
    <script src="js/sensorDisplays.js"></script>
    <script src="js/uiUpdater.js"></script>
</body>
</html>
